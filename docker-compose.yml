version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: majorelle_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: majorelle_api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/jardinMajorelle
      - NODE_ENV=production
      # - JWT_SECRET=jardinMajorel01
      # - AWS_REGION=eu-west-3
      # - AWS_ACCESS_KEY=...
      # - AWS_SECRET_KEY=...
      # - AWS_BUCKET_NAME=...
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongo_data:
